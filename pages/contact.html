<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - T-Air-Travel</title>
    <link rel="icon" href="../images/air-transport.png" type="image/png">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <!--Header-->
    <header>
        <div class="logo">
            <a href="../index.html"><span>Air</span> Travel</a>
        </div>
        <ul class="menu">
            <li><a href="../index.html">Accueil</a></li>
            <li><a href="apropos.html">à propos</a></li>
            <li><a href="destinations.html">destinations</a></li>
            <li><a href="contact.html">contact</a></li>
        </ul>
        <div class="responsive-menu"></div>
        <a href="reserver.html" class="bouton">Réservez Maintenant</a>
    </header>

    <section id="contact">
        <h1 class="title">Contact</h1>
        <form action="">
            <div class="gauche_droite">
                <div class="form_gauche">
                    <label for="nom">Nom Complet</label>
                    <input type="text" id="nom" placeholder="Votre nom complet" required>
                    <label for="objet">Objet</label>
                    <input type="text" id="objet" placeholder="Sujet de votre message" required>
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Votre email" required>
                    <label for="message">Message</label>
                    <textarea id="message" placeholder="Votre message" required></textarea>
                </div>
                <div class="form_droite">
                    <label for="numero">Numéro</label>
                    <input type="tel" id="numero" placeholder="Votre téléphone">
                    <label for="date">Date</label>
                    <input type="date" id="date">
                    <label for="details">Autres Détails</label>
                    <input type="text" id="details" placeholder="Autres informations">
                    <label for="address">Adresse</label>
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2624.9916256937595!2d2.292292615509614!3d48.85837007928746!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x47e66e2964e34e2d%3A0x8ddca9ee380ef7e0!2sTour%20Eiffel!5e0!3m2!1sfr!2sfr!4v1647531560805!5m2!1sfr!2sfr" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
                </div>
            </div>
            <button type="submit">Envoyer</button>
        </form>

        <div class="arrow-container">
            <a href="destinations.html" class="arrow arrow-left">
                <span></span>
            </a>
        </div>
    </section>
    
    <footer>
        <p>Réalisé par <span>T-Julfab</span> | <a href="mentions-legales.html" style="color: #2972d9;">Mentions Légales</a> | Tous les droits sont réservés</p>
    </footer>

    <script src="../js/script.js"></script>
</body>
</html>
